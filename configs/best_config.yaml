# configs/best_config.yaml
# Best hyperparameters confirmed from sweep + teacher pre-training + full training

model:
  architecture  : MobileStudentCNN
  parameters    : 230058
  size_mb       : 0.9

teacher:
  architecture  : facebook/wav2vec2-base
  backbone_frozen_params    : 94371712
  classifier_trainable_params : 198914
  pretrain_epochs : 10
  pretrain_lr     : 0.0001
  pretrain_val_acc: 93.8        # best teacher accuracy before KD

knowledge_distillation:
  learning_rate : 0.0005
  temperature   : 4.0
  alpha         : 0.7          # 70% soft KD loss + 30% hard CE loss

training:
  batch_size    : 16
  max_epochs    : 30
  patience      : 6
  scheduler     : ReduceLROnPlateau
  factor        : 0.5
  sched_patience: 3
  best_epoch    : 22
  stopped_epoch : 28

results:
  dev_eer       : 1.22         # validation EER (natural imbalanced distribution)
  eval_eer      : 4.75         # unseen attacks A07-A19 — TRUE BENCHMARK
  accuracy      : 90.59
  far           : 1.18
  frr           : 10.36

dataset:
  name          : ASVspoof2019_LA
  train_samples : 25380
  dev_samples   : 24844
  eval_samples  : 71237
  sample_rate   : 16000
  max_seconds   : 4

audio_features:
  n_mels        : 64
  n_fft         : 1024
  hop_length    : 512
  f_min         : 0.0
  f_max         : 8000.0